name: enjoys_voice
description: Enjoys Voice / CallNet mobile softphone (SIP-over-WebRTC) with background incoming calls.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter

  # SIP-over-WebSocket signalling + WebRTC media (dart-sip-ua).
  sip_ua: ^1.0.0
  flutter_webrtc: ^0.12.5

  # Native incoming-call UI (CallKit on iOS, ConnectionService on Android)
  # so calls ring on the lock screen / when the app is backgrounded.
  flutter_callkit_incoming: ^2.5.2

  # Push wake-up (FCM data messages on Android, APNs/PushKit on iOS).
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3

  # Secure JWT storage (Keychain / Keystore).
  flutter_secure_storage: ^9.2.2

  # REST client + state + permissions.
  http: ^1.2.2
  provider: ^6.1.2
  permission_handler: ^11.3.1
  uuid: ^4.5.1

  # Reads the installed app version/build number for the Settings screen.
  package_info_plus: ^8.0.0

  # Local tone synthesis (DTMF key tones + outgoing ringback beep).
  audioplayers: ^6.1.0

dev_dependencies:
  flutter_lints: ^4.0.0
  flutter_test:
    sdk: flutter

  # Generates the launcher (app install) icons + adaptive icons from the brand mark.
  flutter_launcher_icons: ^0.14.0
  # Generates the native opening / loading splash screen (incl. Android 12+).
  flutter_native_splash: ^2.4.0

flutter:
  uses-material-design: true

# Brand launcher icon (run: dart run flutter_launcher_icons)
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/branding/icon.png"
  adaptive_icon_background: "assets/branding/icon_background.png"
  adaptive_icon_foreground: "assets/branding/icon_foreground.png"
  min_sdk_android: 21
  remove_alpha_ios: true

# Native splash / opening screen (run: dart run flutter_native_splash:create)
flutter_native_splash:
  color: "#FFFFFF"
  image: assets/branding/splash.png
  color_dark: "#0B0B12"
  image_dark: assets/branding/splash.png
  android_12:
    image: assets/branding/icon_foreground.png
    color: "#6366F1"
    image_dark: assets/branding/icon_foreground.png
    color_dark: "#6366F1"
  android: true
  ios: true
  web: false
