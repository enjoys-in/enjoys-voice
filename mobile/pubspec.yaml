name: enjoys_voice
description: Enjoys Voice / CallNet mobile softphone (SIP-over-WebRTC) with background incoming calls.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter

  # SIP-over-WebSocket signalling + WebRTC media (dart-sip-ua).
  sip_ua: ^1.0.0
  flutter_webrtc: ^0.12.5

  # Native incoming-call UI (CallKit on iOS, ConnectionService on Android)
  # so calls ring on the lock screen / when the app is backgrounded.
  flutter_callkit_incoming: ^2.5.2

  # Push wake-up (FCM data messages on Android, APNs/PushKit on iOS).
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3

  # Secure JWT storage (Keychain / Keystore).
  flutter_secure_storage: ^9.2.2

  # REST client + state + permissions.
  http: ^1.2.2
  provider: ^6.1.2
  permission_handler: ^11.3.1
  uuid: ^4.5.1

dev_dependencies:
  flutter_lints: ^4.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
