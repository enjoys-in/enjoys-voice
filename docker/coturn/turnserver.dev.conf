# ════════════════════════════════════════════════════════════════
#  coturn — DEV TURN/STUN relay for local WebRTC media
#  Why this exists: on Docker Desktop (Windows) the browser runs on the
#  Windows host but FreeSWITCH runs in a container and advertises its
#  container IP (172.21.0.3) in the ICE candidate, which the host browser
#  cannot route to. ext-rtp-ip does NOT fix this (FS treats the call as
#  "local" because drachtio is on the same subnet). coturn sits in BOTH
#  worlds — reachable by the host browser (published 3478 + relay range)
#  AND able to relay to FS over the voipnet docker network — so it bridges
#  the gap.  >>> Update external-ip if your host LAN IP changes (ipconfig). <<<
# ════════════════════════════════════════════════════════════════

listening-port=3478
listening-ip=0.0.0.0

# Advertised relay address = the Windows host LAN IP the browser can reach.
# Docker Desktop publishes 3478 + the relay range below to this host IP.
external-ip=192.168.1.40

# Relay port range — kept SMALL on purpose: Docker Desktop spawns a userland
# proxy per published UDP port, so a large range (prod uses 49152-65535) is
# impractically slow to start locally. Must EXACTLY match the published range
# in docker-compose.dev.yml (coturn service).
min-port=49160
max-port=49200

# ─── Authentication (static long-term credential) ───────────────
# Must match the turn entry in the host .env PUBLIC_ICE_SERVERS.
lt-cred-mech
user=callnet:devsecret123
realm=localhost

# ─── Relay policy ───────────────────────────────────────────────
# IMPORTANT: do NOT deny 172.16.0.0/12 here. coturn must relay media TO
# FreeSWITCH at 172.21.0.3 (inside voipnet). The prod conf denies RFC1918
# ranges for hardening, but that would block FS relaying in this dev topology.
no-multicast-peers

fingerprint
stale-nonce=600

# Log to stdout so `docker logs callnet-coturn` shows the relay path.
# `verbose` is on while we validate the local setup; remove it once stable.
log-file=stdout
verbose
