# ---------------------------------------------------------------------------
# SEMS core configuration — CallNet optional media server.
#
# Starter template. Validate directive names against the doc/ examples shipped
# with the SEMS version you build (directives can change between releases).
# ---------------------------------------------------------------------------

# Where the compiled plug-ins live inside the image (default install prefix).
plugin_path=/usr/local/lib/sems/plug-in/

# --- Network binding -------------------------------------------------------
# Bind on all interfaces inside the container; the published port is 5080
# (see docker-compose.sems.yml). Chosen to avoid clashing with drachtio (5060)
# and the FreeSWITCH MRF profile (5090).
sip_ip=0.0.0.0
sip_port=5080

# Media (RTP) bind + relay range. MUST match the published range in
# docker-compose.sems.yml (20000-20100/udp).
media_ip=0.0.0.0
rtp_low_port=20000
rtp_high_port=20100

# --- Plug-ins to load ------------------------------------------------------
# Codecs first (wav/g711/g722/gsm/ilbc/opus/l16), then the SIP stack and the
# apps we expose. Trim this list to only what you need.
load_plugins=wav;g711;g722;gsm;ilbc;opus;l16;sipctrl;session_timer;uac_auth;announcement;conference;voicemail;sbc

# --- Default application ----------------------------------------------------
# Which app handles an incoming call. Options:
#   application=sbc              -> always run the SBC/B2BUA (transcoding) app
#   application=$(apphdr)        -> pick app from the P-App-Name SIP header
#   application=$(ruri.user)     -> pick app from the Request-URI user part
# Headline use case here = SBC transcoding, so default to sbc.
application=sbc

# --- Logging ---------------------------------------------------------------
# 0=err 1=warn 2=info 3=debug. Foreground logging is enabled via the `-E`
# flag in the Dockerfile CMD (logs go to docker logs).
log_level=2
log_stderr=yes

# --- Tuning ----------------------------------------------------------------
# Worker threads that run per-call session logic. Raise for high concurrency.
session_processor_threads=10
median_session_processor_threads=0
