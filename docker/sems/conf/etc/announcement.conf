# ---------------------------------------------------------------------------
# announcement app — plays a single audio file to the caller, then hangs up.
# Handy as a smoke test that SEMS answers and pushes media.
# ---------------------------------------------------------------------------

# Default announcement played when no per-call file is selected.
# Drop a WAV here (8 kHz / 16-bit mono works everywhere) and adjust the path.
default_announce=/usr/local/lib/sems/audio/default_en.wav

# Where per-DID announcements live (announce file resolved as
# <announce_path>/<domain>/<user>.wav when present).
announce_path=/usr/local/lib/sems/audio/

# Send 183 + early media instead of answering with 200, if desired.
# play_on_early_media=no
