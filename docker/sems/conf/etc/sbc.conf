# ---------------------------------------------------------------------------
# SBC / B2BUA application config.
#
# The SBC app loads named profiles. A profile is a file called
# <name>.sbcprofile.conf in profiles_path. Here we ship one profile:
# `transcode` (see transcode.sbcprofile.conf), used for PSTN<->WebRTC codec
# bridging.
# ---------------------------------------------------------------------------

# Directory that holds the *.sbcprofile.conf files.
profiles_path=/usr/local/etc/sems/etc/

# Profiles to load at startup (semicolon-separated for multiple).
load_profiles=transcode

# Which profile to use when no per-call selection is made.
# You can also select dynamically, e.g.:
#   active_profile=$(paramhdr:profile)
active_profile=transcode
