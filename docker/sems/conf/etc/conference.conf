# ---------------------------------------------------------------------------
# conference app — N-way audio mixing. Callers dialing the same conference id
# (the Request-URI user, by default) are mixed together.
# ---------------------------------------------------------------------------

# Audio played when a participant is alone in the room.
default_announce=/usr/local/lib/sems/audio/conference/first_participant.wav

# Optional entering/leaving cues.
# join_sound=/usr/local/lib/sems/audio/conference/beep.wav
# drop_sound=/usr/local/lib/sems/audio/conference/beep.wav

# Play the lonely-user announcement on a loop until someone else joins.
# announce_when_alone=yes
