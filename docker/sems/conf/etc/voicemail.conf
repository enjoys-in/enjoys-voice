# ---------------------------------------------------------------------------
# voicemail app — records a message and (optionally) emails it / stores it.
#
# This is the "send as email" variant. For an IMAP mailbox or a dial-in
# voicebox use the `mailbox` / `voicebox` apps instead.
# ---------------------------------------------------------------------------

# Where recordings are written before sending.
recording_path=/usr/local/lib/sems/voicemail/

# Greeting played before the beep (per-user greeting overrides this if present
# under <recording_path>/<domain>/<user>/greeting.wav).
default_greeting=/usr/local/lib/sems/audio/voicemail/default_greeting.wav

# Max message length (seconds) and the audio format saved.
max_record_time=120

# --- Email delivery (optional) ---------------------------------------------
# Configure these to email recorded messages. Leave smtp_server empty to skip
# email and only store the WAV under recording_path.
# smtp_server=localhost
# smtp_port=25
# email_from=voicemail@callnet.local
# email_template_path=/usr/local/etc/sems/etc/
