# ---------------------------------------------------------------------------
# SBC profile: "transcode"
#
# A back-to-back user agent that relays RTP and transcodes audio between the
# two legs — e.g. narrowband PSTN (PCMU/PCMA) on one side and Opus/WebRTC on
# the other. This is the headline reason to keep SEMS around as an option.
#
# NOTE: this routes the B-leg straight to the Request-URI by default. Adapt
# RURI / next_hop to point at your trunk or internal target before real use.
# ---------------------------------------------------------------------------

# --- Call routing (B-leg target) -------------------------------------------
RURI=$r
From=$f
To=$t
# Send the outbound leg to a fixed next hop instead of the RURI host, e.g. your
# drachtio or trunk edge. Leave empty to use the RURI host.
# next_hop=drachtio-server:5060

# --- Media handling --------------------------------------------------------
# Anchor media in SEMS (required for transcoding and NAT handling).
enable_rtprelay=yes
rtprelay_interface=default

# Transcoding: the codecs SEMS will offer/accept on the relayed media. SEMS
# will transcode between whatever each leg negotiates and this set.
enable_transcoder=yes
transcoder_codecs=PCMU,PCMA,opus,G722
# always = transcode whenever needed; on_missing_compatible = only when the two
# legs share no common codec.
transcoder_mode=on_missing_compatible

# --- Session timer (RFC 4028) ----------------------------------------------
enable_session_timer=yes
session_expires=300
minimum_timer=90

# --- SIP hygiene -----------------------------------------------------------
# Hide internal Contact / change identity if you use this as an edge SBC.
# contact_hiding=yes
# Drop noisy/unsupported headers between legs as needed.
# header_filter=blacklist
# header_list=X-Internal
