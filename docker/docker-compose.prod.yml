version: '3.8'
name: voip-stack

# Cap every container's logs so they can't grow unbounded. Docker's json-file
# driver rotates by SIZE (not an exact line count): ~50k per file is roughly
# ~250 log lines, and keeping 2 files retains about the most recent ~500 lines
# while older entries are automatically overwritten on rotation.
x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "50k"
    max-file: "2"

# Shared ICE server list handed to BOTH the Node API (embeddable widget path,
# config.widget.iceServers) AND the web dialer (runtime-config.js written by the
# web entrypoint). They are TWO separate ICE sources — both MUST carry the TURN
# entry or the browser keeps offering only host candidates and media fails.
# >>> The TURN `credential` MUST match user=callnet:<pwd> in
#     prod/coturn/turnserver.conf, and the IP must be the VPS public IP. <<<
x-ice-servers: &ice-servers '[{"urls":"stun:stun.l.google.com:19302"},{"urls":"turn:77.237.241.24:3478?transport=udp","username":"callnet","credential":"devsecret123"}]'

services:
  drachtio-server:
    image: drachtio/drachtio-server
    container_name: drachtio-server
    logging: *default-logging
    ports:
      - "127.0.0.1:9022:9022" # Drachtio control socket — loopback only (server-to-server)
      - "5060:5060/udp" # SIP UDP
      - "5060:5060/tcp" # SIP TCP
      - "5065:5065/tcp" # SIP WebSocket (for browser SIP.js)
    environment:
      - DRACHTIO_SECRET=siprocks
      - DRACHTIO_LISTEN=tcp,udp
      - DRACHTIO_PORT=9022
      - DRACHTIO_EXTERNAL_IP=auto
    restart: unless-stopped
    networks:
      # No static IP needed: reached by service name "drachtio-server" (DRACHTIO_HOST).
      - voipnet
    volumes:
      - ./drachtio-server/config/drachtio.conf.prod.xml:/etc/drachtio.conf.xml
      # TLS certs for the wss listener on :5065 (sips:*;transport=wss).
      # Host dir must contain enjoys.in.key + enjoys.in.pem (paths referenced by
      # <tls> in drachtio.conf.prod.xml). Read-only.
      - /etc/caddy/certs:/etc/drachtio/tls:ro
  drachtio-freeswitch:
    # Custom image = stock FreeSWITCH + Piper neural TTS (built from
    # ./freeswitch-custom). To fall back to the stock image, comment the line
    # below and uncomment the safarov one.
    image: mullayam06/freeswitch-piper:latest
    # image: safarov/freeswitch:latest   # stock (no Piper) — future fallback
    container_name: drachtio-freeswitch
    logging: *default-logging
    ports:
      - "8021:8021" # ESL (Event Socket)
      - "5090:5090/udp" # MRF SIP (drachtio_mrf profile)
      - "5090:5090/tcp"
      - "16384-16500:16384-16500/udp" # RTP media
    cap_add:
      - SYS_NICE
    environment:
      - SOUND_RATES=8000:16000
      - SOUND_TYPES=music:en-us-callie
      - NODE_SERVER_IP=api
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./freeswitch_configs:/etc/freeswitch
      # PROD-ONLY override: overlay the single MRF profile on top of the shared
      # config dir so ext-rtp-ip advertises the VPS PUBLIC IP for RTP/media (the
      # shared file uses $${local_ip_v4} = the container's internal docker IP,
      # which browsers can't reach -> one-way / no audio). ext-sip-ip stays on the
      # internal IP (SIP only talks to drachtio inside the network). A file bind-mount on a
      # longer path wins over the ./freeswitch_configs dir mount above. This file
      # lives only in prod/ and is referenced ONLY here (never in the dev compose).
      # >>> Update the public IP inside prod/freeswitch/drachtio_mrf.xml on change.
      - ../prod/freeswitch/drachtio_mrf.xml:/etc/freeswitch/sip_profiles/drachtio_mrf.xml:ro
      # PROD-ONLY override: relax MRF SRTP policy so real WebRTC browsers (DTLS-
      # SRTP, no a=crypto) negotiate media instead of failing with "Crypto not
      # negotiated but required". The shared dialplan/mrf.xml forces SDES on the
      # inbound browser leg (rtp_secure_media_inbound=true); this prod copy sets
      # both knobs to `optional` so DTLS auto-negotiates. Dev keeps the strict
      # behaviour (file referenced ONLY here). Longer dest path wins over the dir.
      - ../prod/freeswitch/dialplan-mrf.xml:/etc/freeswitch/dialplan/mrf.xml:ro
      - ../prod/freeswitch/tts_commandline.conf.xml:/etc/freeswitch/autoload_configs/tts_commandline.conf.xml:ro


      - ./freeswitch_sounds:/usr/share/freeswitch/sounds
      - ./recordings:/usr/local/freeswitch/recordings
    # The image's /healthcheck.sh authenticates with the DEFAULT ESL password
    # (ClueCon) and therefore ALWAYS fails here (real password is JambonzR0ck$),
    # leaving the container permanently (unhealthy). Override it with the correct
    # password. In compose, $$ becomes a literal $ after interpolation; the
    # single quotes then keep it literal for the shell.
    healthcheck:
      test: ["CMD-SHELL", "fs_cli -p 'JambonzR0ck$$' -x status | grep -q 'is ready'"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    networks:
      # No static IP needed: reached by service name "drachtio-freeswitch" (FREESWITCH_HOST).
      - voipnet
    restart: unless-stopped

  coturn:
    image: coturn/coturn:latest
    container_name: callnet-coturn
    logging: *default-logging
    # TURN/STUN relay for WebRTC media. On a VPS the remote browser can't reach
    # FreeSWITCH's container IP directly, so voicemail/IVR/conference/queue audio
    # is relayed: browser -> coturn (VPS public IP, published ports) -> FS (over
    # voipnet). Runs in BRIDGE mode (NOT host) so coturn sits ON voipnet and CAN
    # reach the FS container IP; turnserver.conf allow-lists the 10.89.0.0/24
    # peer subnet. Do NOT add `-n` to the command — it makes coturn ignore -c.
    command: ["-c", "/etc/coturn/turnserver.conf"]
    ports:
      - "3478:3478/udp" # STUN/TURN
      - "3478:3478/tcp" # TURN over TCP
      # Relay port range — MUST exactly match min-port/max-port in
      # turnserver.conf and be opened in the VPS firewall (UDP). Widen all three
      # together if you need more concurrent relayed calls (~1 port per leg).
      - "49152-49199:49152-49199/udp"
    volumes:
      # compose cwd = docker/, so ../prod reaches the repo prod/ folder (same as
      # the freeswitch overrides above). Read-only.
      - ../prod/coturn/turnserver.conf:/etc/coturn/turnserver.conf:ro
    networks:
      - voipnet
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: callnet-postgres
    logging: *default-logging
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "5442:5432" # host 5442 -> container 5432 (5432 is busy on host)
    volumes:
      - callnet-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - voipnet
    restart: unless-stopped

  valkey:
    image: valkey/valkey:8-alpine
    container_name: callnet-valkey
    logging: *default-logging
    command: ["valkey-server", "--save", "60", "1", "--appendonly", "no"]
    ports:
      - "6372:6379" # host 6372 -> container 6379 (6379 is busy on host)
    volumes:
      - callnet-valkeydata:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - voipnet
    restart: unless-stopped

  go-api:
    build:
      context: ../server
      dockerfile: Dockerfile
    container_name: callnet-go-api
    logging: *default-logging
    ports:
      - "3003:3003" # host 3003 -> container 3003 (Go CRUD API)
    environment:
      # Values mirror server/.env.example. Inside the compose network the stores
      # are reachable by service name on their STANDARD ports (the host port
      # shift only affects host access).
      PORT: "3003"
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/postgres?sslmode=disable
      VALKEY_ADDR: valkey:6379
      VALKEY_PASSWORD: ""
      VALKEY_DB: "0"
      JWT_SECRET: change-this-to-a-secure-random-string
      UPLOAD_DIR: ./uploads/sounds
      # ffmpeg normalizes IVR sound uploads to 16 kHz mono PCM WAV. The binary
      # ships in the go-api image (server/Dockerfile). IVR_SOUND_DIR is bind-
      # mounted below into ./freeswitch_sounds so the drachtio-freeswitch
      # container can play the prompts the Go API writes.
      FFMPEG_PATH: ffmpeg
      IVR_SOUND_DIR: ./uploads/ivr
      # The auth cookies (token + refresh_token) are served over HTTPS at
      # voice.enjoys.in, so mark them Secure. SameSite defaults to "lax" and the
      # domain is host-only (empty) — correct for the single same-origin domain.
      COOKIE_SECURE: "true"
      # SIP config returned to the browser in the login response (sipConfig).
      # Without these the login returns ws://127.0.0.1:5065 + sip:localhost,
      # which a remote browser cannot reach. Point them at the public Caddy
      # domain: /sip -> drachtio (wss), /signal -> Node signaling (wss).
      DOMAIN: voice.enjoys.in
      PUBLIC_SIP_WS_URL: "wss://voice.enjoys.in/sip"
      PUBLIC_WS_URL: "wss://voice.enjoys.in/signal"
    volumes:
      # IVR prompts the Go API normalizes with ffmpeg land here; the same host
      # dir is mounted into drachtio-freeswitch at
      # /usr/share/freeswitch/sounds/ivr so FreeSWITCH can play them.
      - ./freeswitch_sounds/ivr:/app/uploads/ivr
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
    networks:
      - voipnet
    restart: unless-stopped

  api:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: callnet-api
    logging: *default-logging
    ports:
      - "3001:3001" # HTTP REST API
      - "3002:3002" # signaling WebSocket
      - "3004:3004" # media-stream WS
      - "3005:3005" # browser-bridge WS     
    environment:
      # Stores are reachable by service name on their STANDARD ports inside the
      # compose network (the host port shift only affects host access).
      HTTP_PORT: "3001"
      WS_PORT: "3002"
      MEDIA_STREAM_WS_PORT: "3004"
      MEDIA_STREAM_BRIDGE_PORT: "3005"
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/postgres?sslmode=disable
      VALKEY_ADDR: valkey:6379
      VALKEY_PASSWORD: ""
      VALKEY_DB: "0"
      # Must match the Go API so the signaling WS can verify its access tokens.
      JWT_SECRET: change-this-to-a-secure-random-string
      # SIP realm/domain — MUST match the Go API DOMAIN so the REGISTER the
      # browser sends (sip:<ext>@voice.enjoys.in) is accepted.
      DOMAIN: voice.enjoys.in
      # Public SIP-over-WS URL the signaling server hands the browser in its
      # `registered` message. Without this it falls back to ws://127.0.0.1:5065,
      # which a remote browser cannot reach. /sip -> drachtio (wss) via Caddy.
      PUBLIC_SIP_WS_URL: "wss://voice.enjoys.in/sip"
      PUBLIC_WS_URL: "wss://voice.enjoys.in/signal"
      # ICE servers for the embeddable click-to-call widget (Node serves these
      # in the widget connect response). MUST include the coturn TURN relay or
      # widget calls into FS (voicemail/IVR/conference) have no audio on a VPS.
      PUBLIC_ICE_SERVERS: *ice-servers
      # Origins allowed to open the signaling WebSocket (CSWSH defense). Without
      # this, only localhost is allowed and the prod browser handshake at
      # wss://voice.enjoys.in/signal is REJECTED before connecting.
      ALLOWED_ORIGINS: "https://voice.enjoys.in"
      DRACHTIO_HOST: drachtio-server
      DRACHTIO_PORT: "9022"
      DRACHTIO_SECRET: siprocks
      FREESWITCH_HOST: drachtio-freeswitch
      FREESWITCH_PORT: "8021"
      # TTS engine for IVR `say:` prompts. The custom image
      # (mullayam06/freeswitch-piper) bundles Piper + mod_tts_commandline and
      # wires it as the default engine, so use neural Piper TTS here. To fall
      # back to the stock safarov image, switch these to flite / slt (mod_flite
      # is built in; Piper is NOT present there).
      TTS_ENGINE: tts_commandline
      TTS_VOICE: en_US-amy-medium
      # ESL-OUTBOUND callback target (advertisedAddress / X-esl-outbound). After
      # answering the MRF INVITE, FreeSWITCH connects BACK to the fsmrf listener
      # on :8085 to drive IVR/voicemail media. In prod the Node app runs INSIDE
      # the callnet-api container, so FS must reach it by its docker-network name
      # over voipnet. The code default is host.docker.internal, which points at
      # the HOST — where :8085 is NOT published — so FS can't connect back =>
      # "Connection timeout" on every IVR/voicemail/conference call. (Local works
      # because the dev app runs on the host, reachable via host.docker.internal or localhost)
      FREESWITCH_LISTEN_ADDRESS: 10.89.0.10
      FREESWITCH_LISTEN_PORT: "8085"
      RECORDINGS_DIR: /app/recordings
    volumes:
      - callnet-recordings:/app/recordings
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
      drachtio-server:
        condition: service_started
      drachtio-freeswitch:
        condition: service_healthy
    networks:
      # Only the api keeps a pinned IP so the FreeSWITCH MRF dialplan can dial
      # the ESL callback back to a known, stable address (see dialplan-mrf.xml).
      voipnet:
        ipv4_address: 10.89.0.10
    restart: unless-stopped

  web:
    build:
      context: ../web
      dockerfile: Dockerfile
    container_name: callnet-web
    logging: *default-logging
    ports:
      - "4500:4500" # Next.js frontend
    environment:
      # Runtime config injected into public/runtime-config.js at container start.
      # Point the browser at the public Caddy domain (must match prod/Caddyfile:
      # voice.enjoys.in). HTTPS site -> WS endpoints MUST be wss:// (browsers
      # block ws:// from an https page).
      PUBLIC_API_BASE: "https://voice.enjoys.in" # For local dev, this can be http://localhost:3001 if API is exposed on host.
      PUBLIC_GO_API_BASE: "https://voice.enjoys.in"
      PUBLIC_WS_URL: "wss://voice.enjoys.in/signal"
      # Optional: browser-bridge WS + token (only if streaming/bridge is used).
      # PUBLIC_BRIDGE_URL: "wss://voice.enjoys.in/bridge"
      # PUBLIC_BRIDGE_TOKEN: ""
      PUBLIC_ICE_SERVERS: *ice-servers
      # Server-side JWT verification (middleware + Server Components reading the
      # httpOnly cookie). MUST match the go-api/api JWT_SECRET above so prod
      # fully verifies token signatures; without it the web falls back to an
      # unverified decode. NOT exposed to the browser (no PUBLIC_ prefix).
      JWT_SECRET: change-this-to-a-secure-random-string
    depends_on:
      - go-api
    networks:
      - voipnet
    restart: unless-stopped

networks:
  voipnet:
    driver: bridge
    ipam:
      config:
        # Free subnet outside Docker's default 172.17-172.31 pool to avoid the
        # "failed to set up container networking: Address already in use" clash
        # on a host running many other stacks. Verify it's unused on the host
        # with: docker network inspect $(docker network ls -q) | grep 10.89
        - subnet: 10.89.0.0/24

volumes:
  freeswitch-sounds:
  freeswitch-recordings:
  tele-conf:
  callnet-pgdata:
  callnet-valkeydata:
  callnet-recordings:
