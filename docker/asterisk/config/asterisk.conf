;
; asterisk.conf - Main Asterisk configuration
;
; Asterisk acts here as a media server + PBX:
;   - Terminates SIP calls
;   - Plays audio / runs IVRs
;   - Records calls
;   - Bridges RTP / media streams
;   - Connects to PSTN / SIP trunks
;   - Handles conferencing
;

[directories](!)
astetcdir => /etc/asterisk
astmoddir => /usr/lib/asterisk/modules
astvarlibdir => /var/lib/asterisk
astdbdir => /var/lib/asterisk
astkeydir => /var/lib/asterisk
astdatadir => /var/lib/asterisk
astagidir => /var/lib/asterisk/agi-bin
astspooldir => /var/spool/asterisk
astrundir => /var/run/asterisk
astlogdir => /var/log/asterisk
astsbindir => /usr/sbin

[options]
; Run as non-privileged user inside the container
;runuser = asterisk
;rungroup = asterisk
maxcalls = 1000
; maxload disabled: inside Docker the host load average reads high, which
; would otherwise make Asterisk reject every new call with congestion.
;maxload = 0.9
; Default language for prompts
defaultlanguage = en
; Improve transcoding / media handling
transcode_via_sln = yes
; Use UTC for CDR/timestamps
documentation_language = en_US
