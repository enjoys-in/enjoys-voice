;
; http.conf - Embedded HTTP server
;
; Required for the WebSocket (ws/wss) transport used by browser WebRTC clients.
;

[general]
enabled = yes
bindaddr = 0.0.0.0
bindport = 8088
; For secure WebSocket (wss) provide a TLS cert/key:
;tlsenable = yes
;tlsbindaddr = 0.0.0.0:8089
;tlscertfile = /etc/asterisk/keys/asterisk.pem
;tlsprivatekey = /etc/asterisk/keys/asterisk.key
