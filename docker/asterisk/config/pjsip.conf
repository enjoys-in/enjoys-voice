;
; pjsip.conf - SIP endpoints, transports, trunks
;
; Defines how Asterisk terminates SIP calls:
;   - UDP/TCP transport for phones & internal devices
;   - WSS/WS transport for browser WebRTC clients
;   - An outbound registration + endpoint for a PSTN/SIP trunk
;

; =====================================================================
; TRANSPORTS
; =====================================================================
[transport-udp]
type = transport
protocol = udp
bind = 0.0.0.0:5070            ; 5060 is used by drachtio; Asterisk uses 5070

[transport-tcp]
type = transport
protocol = tcp
bind = 0.0.0.0:5070

[transport-ws]
type = transport
protocol = ws                  ; WebSocket (browser SIP.js) via res_http_websocket
bind = 0.0.0.0:8088

[transport-wss]
type = transport
protocol = wss                 ; Secure WebSocket (WebRTC)
bind = 0.0.0.0:8089

; =====================================================================
; INTERNAL ENDPOINT TEMPLATES (softphones / webrtc users)
; =====================================================================
[endpoint-internal](!)
type = endpoint
context = internal
disallow = all
allow = opus,ulaw,alaw
direct_media = no              ; keep media on Asterisk so it can record/bridge
rtp_symmetric = yes
force_rport = yes
rewrite_contact = yes
trust_id_inbound = yes

[webrtc-endpoint](!,endpoint-internal)
webrtc = yes                  ; enables DTLS-SRTP, ICE, rtcp-mux, AVPF
transport = transport-wss
use_avpf = yes
media_use_received_transport = yes
ice_support = yes
media_encryption = dtls
dtls_verify = fingerprint
dtls_setup = actpass
dtls_auto_generate_cert = yes

; --- Example internal user 1001 (softphone) ---
[1001](endpoint-internal)
type = endpoint
transport = transport-udp
auth = auth1001
aors = 1001
callerid = User 1001 <1001>

[auth1001]
type = auth
auth_type = userpass
username = 1001
password = changeme1001

[1001]
type = aor
max_contacts = 2
remove_existing = yes

; --- Example browser/WebRTC user 2001 ---
[2001](webrtc-endpoint)
type = endpoint
auth = auth2001
aors = 2001
callerid = Web User 2001 <2001>

[auth2001]
type = auth
auth_type = userpass
username = 2001
password = changeme2001

[2001]
type = aor
max_contacts = 1
remove_existing = yes

; =====================================================================
; PSTN / SIP TRUNK
;   Replace host, username and password with your provider's details.
; =====================================================================
[trunk-reg]
type = registration
transport = transport-udp
outbound_auth = trunk-auth
server_uri = sip:sip.provider.example
client_uri = sip:YOUR_TRUNK_USER@sip.provider.example
retry_interval = 60

[trunk-auth]
type = auth
auth_type = userpass
username = YOUR_TRUNK_USER
password = YOUR_TRUNK_PASSWORD

[trunk]
type = endpoint
context = from-trunk          ; inbound PSTN calls land in this dialplan context
transport = transport-udp
disallow = all
allow = ulaw,alaw,opus
outbound_auth = trunk-auth
aors = trunk-aor
from_user = YOUR_TRUNK_USER
direct_media = no
rtp_symmetric = yes
force_rport = yes
rewrite_contact = yes

[trunk-aor]
type = aor
contact = sip:sip.provider.example

[trunk-identify]
type = identify
endpoint = trunk
match = sip.provider.example
