;
; rtp.conf - RTP media engine (media bridging)
;
; Defines the UDP port range used for RTP audio/video streams that Asterisk
; bridges between endpoints. Must be opened on the firewall / published by the
; container.
;

[general]
rtpstart = 10000
rtpend = 10200
; STUN/TURN can be added here for NAT traversal with WebRTC clients
;stunaddr = stun.l.google.com:19302
icesupport = yes
