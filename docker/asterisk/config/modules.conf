;
; modules.conf - Module loading
;
; We autoload everything, then explicitly ensure the modules needed for
; SIP termination, media, IVR, recording, trunking and conferencing.
;

[modules]
autoload = yes

; --- SIP stack (PJSIP / chan_pjsip) ---
preload = res_pjproject.so
preload = res_pjsip.so
load = res_pjsip.so
load = res_pjsip_session.so
load = chan_pjsip.so
load = res_pjsip_outbound_registration.so   ; register to PSTN/SIP trunks
load = res_pjsip_outbound_authenticator_digest.so
load = res_pjsip_endpoint_identifier_ip.so
load = res_pjsip_endpoint_identifier_user.so

; --- WebRTC / WebSocket transport (browser SIP clients) ---
load = res_http_websocket.so
load = res_pjsip_transport_websocket.so

; --- RTP / media engine ---
load = res_rtp_asterisk.so

; --- Audio playback, IVR, recording ---
load = app_playback.so
load = app_read.so          ; IVR digit collection
load = app_record.so        ; call recording
load = app_mixmonitor.so    ; record live/bridged calls
load = app_dial.so
load = app_voicemail.so

; --- Conferencing ---
load = app_confbridge.so
load = res_musiconhold.so

; --- Codecs / formats commonly needed ---
load = codec_ulaw.so
load = codec_alaw.so
load = codec_opus.so
load = codec_gsm.so
load = format_wav.so
load = format_pcm.so

; Skip modules we don't use to keep the box lean
noload = chan_sip.so        ; legacy SIP channel (replaced by chan_pjsip)
noload = pbx_ael.so
