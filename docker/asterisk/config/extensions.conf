;
; extensions.conf - Dialplan
;
; Demonstrates the core Asterisk roles:
;   - Terminate & route SIP calls (internal + trunk)
;   - Play audio
;   - Run an IVR (Read/Background + Goto)
;   - Record calls (MixMonitor)
;   - Bridge media (Dial)
;   - PSTN/SIP trunk in/out
;   - Conferencing (ConfBridge)
;

[globals]
TRUNK = PJSIP/trunk
RECORDINGS_DIR = /var/spool/asterisk/recording

; ---------------------------------------------------------------------
; Internal calls between registered endpoints (1001, 2001, ...)
; ---------------------------------------------------------------------
[internal]
; Record every internal call, then bridge the two parties.
exten => _XXXX,1,NoOp(Internal call to ${EXTEN})
 same => n,Set(CDR(recordfile)=${UNIQUEID}.wav)
 same => n,MixMonitor(${RECORDINGS_DIR}/${UNIQUEID}.wav,b)
 same => n,Dial(PJSIP/${EXTEN},30)
 same => n,Hangup()

; --- Test extensions (no registered device or sound files needed) ---
; Echo test: hear your own audio looped back (verifies two-way media path).
exten => *43,1,NoOp(Echo test)
 same => n,Answer()
 same => n,Echo()
 same => n,Hangup()

; Tone test: answer and play a 1004 Hz test tone (Milliwatt) until hangup.
; Useful to confirm signalling + one-way media without any prompt files.
exten => 600,1,NoOp(Tone/milliwatt test)
 same => n,Answer()
 same => n,Milliwatt()
 same => n,Hangup()

; IVR entry point
exten => 5000,1,Goto(ivr-main,s,1)

; Conference room entry point
exten => 6000,1,Goto(conference,s,1)

; Dial out to the PSTN: 9 + number  (e.g. 9 + 919876543210)
exten => _9.,1,NoOp(Outbound to ${EXTEN:1} via trunk)
 same => n,Set(CALLERID(num)=YOUR_DID_NUMBER)
 same => n,MixMonitor(${RECORDINGS_DIR}/${UNIQUEID}.wav,b)
 same => n,Dial(PJSIP/${EXTEN:1}@trunk,60)
 same => n,Hangup()

; ---------------------------------------------------------------------
; IVR - "Press 1 for sales, 2 for support, 0 for operator"
; ---------------------------------------------------------------------
[ivr-main]
exten => s,1,Answer()
 same => n,Wait(1)
 same => n(menu),Background(press-1&press-2&or&press-0)   ; play prompt
 same => n,WaitExten(5)

exten => 1,1,Playback(queue-thankyou)
 same => n,Dial(PJSIP/1001,30)
 same => n,Hangup()

exten => 2,1,Playback(queue-thankyou)
 same => n,Dial(PJSIP/2001,30)
 same => n,Hangup()

exten => 0,1,Dial(PJSIP/1001,30)
 same => n,Hangup()

; Invalid / no input handling
exten => i,1,Playback(invalid)
 same => n,Goto(s,menu)
exten => t,1,Playback(vm-goodbye)
 same => n,Hangup()

; ---------------------------------------------------------------------
; Conference bridge (ConfBridge)
; ---------------------------------------------------------------------
[conference]
exten => s,1,Answer()
 same => n,ConfBridge(main_conference,default_bridge,default_user)
 same => n,Hangup()

; ---------------------------------------------------------------------
; Inbound calls from the PSTN/SIP trunk
; ---------------------------------------------------------------------
[from-trunk]
; Send all inbound trunk calls into the IVR.
exten => _.,1,NoOp(Inbound trunk call to ${EXTEN})
 same => n,Goto(ivr-main,s,1)
