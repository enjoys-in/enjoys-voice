<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Asterisk WebRTC Test Client</title>
  <!-- SIP.js is loaded as an ES module in the script below -->
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: #0b0f14; color: #e6edf3; padding: 16px;
    }
    .card {
      width: 100%; max-width: 420px; background: #11161d; border: 1px solid #1f2933;
      border-radius: 16px; padding: 24px; box-shadow: 0 10px 40px rgba(0,0,0,.4);
    }
    h1 { font-size: 18px; margin: 0 0 4px; }
    .sub { font-size: 12px; color: #8b98a5; margin: 0 0 20px; }
    label { display: block; font-size: 12px; color: #8b98a5; margin: 12px 0 4px; }
    input, select {
      width: 100%; padding: 10px 12px; border-radius: 10px; border: 1px solid #243040;
      background: #0d1117; color: #e6edf3; font-size: 14px;
    }
    .row { display: flex; gap: 10px; }
    .row > * { flex: 1; }
    .btns { display: flex; gap: 10px; margin-top: 20px; }
    button {
      flex: 1; padding: 12px; border: none; border-radius: 10px; font-size: 14px; font-weight: 600;
      cursor: pointer; transition: transform .05s, opacity .15s;
    }
    button:active { transform: scale(.97); }
    button:disabled { opacity: .4; cursor: not-allowed; }
    .reg { background: #2563eb; color: #fff; }
    .unreg { background: #374151; color: #e6edf3; }
    .call { background: #16a34a; color: #fff; }
    .hang { background: #dc2626; color: #fff; }
    .status {
      margin-top: 18px; padding: 10px 12px; border-radius: 10px; font-size: 13px;
      background: #0d1117; border: 1px solid #243040; min-height: 20px;
    }
    .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; background: #6b7280; }
    .dot.ok { background: #16a34a; }
    .dot.ring { background: #f59e0b; animation: pulse 1s infinite; }
    .dot.err { background: #dc2626; }
    @keyframes pulse { 50% { opacity: .3; } }
    .log {
      margin-top: 12px; font-family: ui-monospace, monospace; font-size: 11px; color: #8b98a5;
      max-height: 140px; overflow-y: auto; white-space: pre-wrap; line-height: 1.5;
    }
    .presets { display: flex; gap: 8px; margin-top: 6px; }
    .presets button { flex: 1; padding: 6px; font-size: 12px; background: #1f2933; color: #cbd5e1; font-weight: 500; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Asterisk WebRTC Test Client</h1>
    <p class="sub">SIP.js over WebSocket — for testing the Asterisk PJSIP stack</p>

    <label>WebSocket server</label>
    <input id="wsServer" value="ws://localhost:8088/ws" />

    <div class="row">
      <div>
        <label>SIP user</label>
        <input id="user" value="7001" />
      </div>
      <div>
        <label>Password</label>
        <input id="pass" type="password" value="test7001" />
      </div>
    </div>

    <div class="presets">
      <button onclick="preset('7001','test7001','7002')">Login as 7001</button>
      <button onclick="preset('7002','test7002','7001')">Login as 7002</button>
    </div>

    <label>SIP domain</label>
    <input id="domain" value="localhost" />

    <label>Call target (extension)</label>
    <input id="target" value="7002" placeholder="7002, 600 (tone), *43 (echo), 5000 (IVR)" />

    <div class="btns">
      <button class="reg" id="btnReg" onclick="doRegister()">Register</button>
      <button class="unreg" id="btnUnreg" onclick="doUnregister()" disabled>Unregister</button>
    </div>
    <div class="btns">
      <button class="call" id="btnCall" onclick="doCall()" disabled>Call</button>
      <button class="hang" id="btnHang" onclick="doHangup()" disabled>Hang up</button>
    </div>

    <div class="status"><span class="dot" id="dot"></span><span id="statusText">Idle</span></div>
    <div class="log" id="log"></div>

    <audio id="remoteAudio" autoplay></audio>
  </div>

  <script type="module">
    // SIP.js ships only as an ES module — import the browser-ready +esm bundle.
    import { Web } from "https://cdn.jsdelivr.net/npm/sip.js@0.21.2/+esm";

    let simpleUser = null;

    const $ = (id) => document.getElementById(id);
    const logEl = $("log");
    function log(msg) {
      const t = new Date().toLocaleTimeString();
      logEl.textContent = `[${t}] ${msg}\n` + logEl.textContent;
    }
    function setStatus(text, cls) {
      $("statusText").textContent = text;
      $("dot").className = "dot" + (cls ? " " + cls : "");
    }
    function preset(user, pass, target) {
      $("user").value = user;
      $("pass").value = pass;
      $("target").value = target;
    }
    function setRegisteredUI(reg) {
      $("btnReg").disabled = reg;
      $("btnUnreg").disabled = !reg;
      $("btnCall").disabled = !reg;
    }
    function setInCallUI(inCall) {
      $("btnCall").disabled = inCall || !simpleUser?.isConnected?.();
      $("btnHang").disabled = !inCall;
    }

    async function doRegister() {
      const server = $("wsServer").value.trim();
      const user = $("user").value.trim();
      const pass = $("pass").value;
      const domain = $("domain").value.trim();
      const aor = `sip:${user}@${domain}`;

      try {
        setStatus("Connecting…", "ring");
        simpleUser = new Web.SimpleUser(server, {
          aor,
          media: { remote: { audio: $("remoteAudio") } },
          userAgentOptions: {
            authorizationUsername: user,
            authorizationPassword: pass,
            displayName: user,
            logLevel: "warn",
          },
        });

        simpleUser.delegate = {
          onCallReceived: async () => {
            log("Incoming call — auto-answering");
            setStatus("Incoming call…", "ring");
            await simpleUser.answer();
          },
          onCallAnswered: () => { log("Call answered"); setStatus("In call", "ok"); setInCallUI(true); },
          onCallHangup: () => { log("Call ended"); setStatus("Registered", "ok"); setInCallUI(false); },
          onRegistered: () => { log("Registered"); setStatus("Registered", "ok"); setRegisteredUI(true); setInCallUI(false); },
          onUnregistered: () => { log("Unregistered"); setStatus("Idle"); setRegisteredUI(false); },
          onServerConnect: () => log("WebSocket connected"),
          onServerDisconnect: (e) => { log("WebSocket disconnected"); setStatus("Disconnected", "err"); },
        };

        await simpleUser.connect();
        await simpleUser.register();
      } catch (err) {
        log("Register error: " + (err?.message || err));
        setStatus("Error", "err");
      }
    }

    async function doUnregister() {
      try {
        await simpleUser?.unregister();
        await simpleUser?.disconnect();
        simpleUser = null;
        setRegisteredUI(false);
        setStatus("Idle");
      } catch (err) { log("Unregister error: " + (err?.message || err)); }
    }

    async function doCall() {
      const target = $("target").value.trim();
      const domain = $("domain").value.trim();
      try {
        setStatus("Calling " + target + "…", "ring");
        log("Calling " + target);
        await simpleUser.call(`sip:${target}@${domain}`);
        setInCallUI(true);
      } catch (err) {
        log("Call error: " + (err?.message || err));
        setStatus("Registered", "ok");
      }
    }

    async function doHangup() {
      try { await simpleUser?.hangup(); } catch (err) { log("Hangup error: " + (err?.message || err)); }
    }

    // Inline onclick handlers need these on the global scope (module scope is local).
    Object.assign(window, { preset, doRegister, doUnregister, doCall, doHangup });
    log("SIP.js loaded — ready");
  </script>
</body>
</html>
