<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>WebRTC Video Phone</title>
    <script src="https://cdn.jsdelivr.net/npm/jssip@3.10.0/dist/jssip.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        h1 {
            color: white;
            margin-bottom: 30px;
            text-align: center;
            font-size: 36px;
        }
        .video-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }
        .video-box {
            background: #1a1a1a;
            border-radius: 15px;
            overflow: hidden;
            position: relative;
            aspect-ratio: 16/9;
        }
        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .video-label {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 8px 12px;
            border-radius: 5px;
            font-size: 14px;
        }
        .controls {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }
        input {
            padding: 14px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 15px;
        }
        input:focus {
            outline: none;
            border-color: #667eea;
        }
        .button-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        button {
            flex: 1;
            min-width: 150px;
            padding: 16px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-primary { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
        .btn-success { background: #28a745; color: white; }
        .btn-warning { background: #ffc107; color: #000; }
        .btn-danger { background: #dc3545; color: white; }
        .btn-info { background: #17a2b8; color: white; }
        button:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        button:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .status {
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: center;
            font-weight: 500;
        }
        .status.offline { background: #fee; color: #c33; }
        .status.online { background: #d4edda; color: #155724; }
        .status.calling { background: #fff3cd; color: #856404; }
        .toggle-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .toggle {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px;
            background: #f8f9fa;
            border-radius: 8px;
        }
        .switch {
            position: relative;
            width: 50px;
            height: 26px;
        }
        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #ccc;
            transition: .4s;
            border-radius: 26px;
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 4px;
            bottom: 4px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }
        input:checked + .slider { background-color: #28a745; }
        input:checked + .slider:before { transform: translateX(24px); }
        @media (max-width: 768px) {
            .video-container { grid-template-columns: 1fr; }
            .form-row { grid-template-columns: 1fr; }
            .button-row { flex-direction: column; }
            button { width: 100%; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📹 WebRTC Video Phone</h1>
        
        <div class="video-container">
            <div class="video-box">
                <video id="localVideo" autoplay muted playsinline></video>
                <div class="video-label">You (Local)</div>
            </div>
            <div class="video-box">
                <video id="remoteVideo" autoplay playsinline></video>
                <div class="video-label">Remote</div>
            </div>
        </div>
        
        <div class="controls">
            <div id="status" class="status offline">● Offline</div>
            
            <div class="form-row">
                <input type="text" id="username" placeholder="Username" value="user1">
                <input type="password" id="password" placeholder="Password" value="pass123">
                <input type="text" id="domain" placeholder="Domain">
            </div>
            
            <div class="toggle-group">
                <div class="toggle">
                    <label class="switch">
                        <input type="checkbox" id="videoToggle" checked>
                        <span class="slider"></span>
                    </label>
                    <span>Enable Video</span>
                </div>
                <div class="toggle">
                    <label class="switch">
                        <input type="checkbox" id="audioToggle" checked>
                        <span class="slider"></span>
                    </label>
                    <span>Enable Audio</span>
                </div>
            </div>
            
            <div class="button-row">
                <button id="register" class="btn-primary">Connect</button>
                <button id="unregister" class="btn-danger" disabled>Disconnect</button>
            </div>
            
            <div style="margin: 20px 0;">
                <input type="text" id="callNumber" placeholder="Number to call (user2 or +1234567890)" style="width: 100%;">
            </div>
            
            <div class="button-row">
                <button id="callAudio" class="btn-success" disabled>📞 Audio Call</button>
                <button id="callVideo" class="btn-info" disabled>📹 Video Call</button>
                <button id="hangup" class="btn-danger" disabled>End Call</button>
            </div>
            
            <div class="button-row" style="margin-top: 10px;">
                <button id="muteAudio" class="btn-warning" disabled>🔇 Mute</button>
                <button id="muteVideo" class="btn-warning" disabled>📹 Hide Video</button>
                <button id="switchCamera" class="btn-warning" disabled>🔄 Switch Camera</button>
            </div>
        </div>
    </div>

    <script>
        let phone, session;
        let localStream;
        let audioMuted = false;
        let videoMuted = false;
        
        const status = document.getElementById('status');
        const localVideo = document.getElementById('localVideo');
        const remoteVideo = document.getElementById('remoteVideo');
        
        function updateStatus(msg, cls) {
            status.textContent = '● ' + msg;
            status.className = 'status ' + cls;
        }
        
        // Get local media
        async function getLocalMedia(video = true, audio = true) {
            try {
                localStream = await navigator.mediaDevices.getUserMedia({
                    video: video ? {
                        width: { ideal: 1280 },
                        height: { ideal: 720 },
                        facingMode: 'user'
                    } : false,
                    audio: audio ? {
                        echoCancellation: true,
                        noiseSuppression: true,
                        autoGainControl: true
                    } : false
                });
                
                localVideo.srcObject = localStream;
                console.log('✓ Local media acquired');
                return true;
            } catch (err) {
                console.error('Failed to get local media:', err);
                alert('Cannot access camera/microphone: ' + err.message);
                return false;
            }
        }
        
        // Register
        document.getElementById('register').onclick = async () => {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const domain = document.getElementById('domain').value;
            
            if (!username || !password || !domain) {
                alert('Please fill all fields');
                return;
            }
            
            const socket = new JsSIP.WebSocketInterface(`wss://${domain}:8443`);
            const configuration = {
                sockets: [socket],
                uri: `sip:${username}@${domain}`,
                password: password,
                register: true,
                session_timers: false
            };
            
            phone = new JsSIP.UA(configuration);
            
            phone.on('connected', () => updateStatus('Connected', 'online'));
            
            phone.on('registered', () => {
                updateStatus('Registered - Ready', 'online');
                document.getElementById('register').disabled = true;
                document.getElementById('unregister').disabled = false;
                document.getElementById('callAudio').disabled = false;
                document.getElementById('callVideo').disabled = false;
            });
            
            phone.on('registrationFailed', (e) => {
                updateStatus('Registration Failed: ' + e.cause, 'offline');
            });
            
            phone.on('newRTCSession', (e) => {
                session = e.session;
                
                if (session.direction === 'incoming') {
                    updateStatus('Incoming call...', 'calling');
                    
                    const hasVideo = session.remote_identity.uri.toString().includes('video');
                    
                    getLocalMedia(hasVideo, true).then(success => {
                        if (success) {
                            session.answer({
                                mediaConstraints: {
                                    audio: true,
                                    video: hasVideo
                                },
                                mediaStream: localStream
                            });
                        }
                    });
                }
                
                session.on('peerconnection', (e) => {
                    const pc = e.peerconnection;
                    
                    pc.ontrack = (event) => {
                        console.log('Remote track received:', event.track.kind);
                        remoteVideo.srcObject = event.streams[0];
                    };
                });
                
                session.on('accepted', () => {
                    updateStatus('Call Active', 'online');
                    document.getElementById('callAudio').disabled = true;
                    document.getElementById('callVideo').disabled = true;
                    document.getElementById('hangup').disabled = false;
                    document.getElementById('muteAudio').disabled = false;
                    document.getElementById('muteVideo').disabled = false;
                    document.getElementById('switchCamera').disabled = false;
                });
                
                session.on('ended', () => {
                    updateStatus('Call Ended', 'online');
                    cleanup();
                });
                
                session.on('failed', (e) => {
                    updateStatus('Call Failed: ' + e.cause, 'online');
                    cleanup();
                });
            });
            
            phone.start();
            updateStatus('Connecting...', 'calling');
        };
        
        // Unregister
        document.getElementById('unregister').onclick = () => {
            if (phone) {
                phone.stop();
                updateStatus('Disconnected', 'offline');
                document.getElementById('register').disabled = false;
                document.getElementById('unregister').disabled = true;
                document.getElementById('callAudio').disabled = true;
                document.getElementById('callVideo').disabled = true;
            }
        };
        
        // Audio Call
        document.getElementById('callAudio').onclick = async () => {
            const number = document.getElementById('callNumber').value;
            if (!number) {
                alert('Enter number to call');
                return;
            }
            
            const success = await getLocalMedia(false, true);
            if (!success) return;
            
            makeCall(number, false);
        };
        
        // Video Call
        document.getElementById('callVideo').onclick = async () => {
            const number = document.getElementById('callNumber').value;
            if (!number) {
                alert('Enter number to call');
                return;
            }
            
            const success = await getLocalMedia(true, true);
            if (!success) return;
            
            makeCall(number, true);
        };
        
        function makeCall(number, video) {
            const domain = document.getElementById('domain').value;
            
            const options = {
                mediaConstraints: {
                    audio: true,
                    video: video
                },
                mediaStream: localStream,
                pcConfig: {
                    iceServers: [
                        { urls: 'stun:stun.l.google.com:19302' }
                    ]
                }
            };
            
            updateStatus('Calling...', 'calling');
            session = phone.call(`sip:${number}@${domain}`, options);
        };
        
        // Hangup
        document.getElementById('hangup').onclick = () => {
            if (session) {
                session.terminate();
            }
            cleanup();
        };
        
        // Mute Audio
        document.getElementById('muteAudio').onclick = () => {
            if (!localStream) return;
            
            const audioTrack = localStream.getAudioTracks()[0];
            if (audioTrack) {
                audioMuted = !audioMuted;
                audioTrack.enabled = !audioMuted;
                document.getElementById('muteAudio').textContent = 
                    audioMuted ? '🔊 Unmute' : '🔇 Mute';
            }
        };
        
        // Mute Video
        document.getElementById('muteVideo').onclick = () => {
            if (!localStream) return;
            
            const videoTrack = localStream.getVideoTracks()[0];
            if (videoTrack) {
                videoMuted = !videoMuted;
                videoTrack.enabled = !videoMuted;
                document.getElementById('muteVideo').textContent = 
                    videoMuted ? '📹 Show Video' : '📹 Hide Video';
            }
        };
        
        // Switch Camera
        document.getElementById('switchCamera').onclick = async () => {
            if (!localStream) return;
            
            const videoTrack = localStream.getVideoTracks()[0];
            if (!videoTrack) return;
            
            const currentFacingMode = videoTrack.getSettings().facingMode;
            const newFacingMode = currentFacingMode === 'user' ? 'environment' : 'user';
            
            try {
                const newStream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: newFacingMode },
                    audio: false
                });
                
                const newVideoTrack = newStream.getVideoTracks()[0];
                const sender = session.connection.getSenders().find(s => s.track && s.track.kind === 'video');
                
                if (sender) {
                    await sender.replaceTrack(newVideoTrack);
                    videoTrack.stop();
                    localStream.removeTrack(videoTrack);
                    localStream.addTrack(newVideoTrack);
                    localVideo.srcObject = localStream;
                    console.log('✓ Camera switched');
                }
            } catch (err) {
                console.error('Failed to switch camera:', err);
                alert('Cannot switch camera: ' + err.message);
            }
        };
        
        function cleanup() {
            document.getElementById('callAudio').disabled = false;
            document.getElementById('callVideo').disabled = false;
            document.getElementById('hangup').disabled = true;
            document.getElementById('muteAudio').disabled = true;
            document.getElementById('muteVideo').disabled = true;
            document.getElementById('switchCamera').disabled = true;
            
            // Reset mute buttons
            document.getElementById('muteAudio').textContent = '🔇 Mute';
            document.getElementById('muteVideo').textContent = '📹 Hide Video';
            audioMuted = false;
            videoMuted = false;
            
            // Stop local stream
            if (localStream) {
                localStream.getTracks().forEach(track => track.stop());
                localStream = null;
            }
            
            // Clear remote video
            remoteVideo.srcObject = null;
        }
        
        // Set domain from URL
        window.onload = () => {
            document.getElementById('domain').value = window.location.hostname;
        };
    </script>
</body>
</html>
