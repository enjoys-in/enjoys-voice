# ════════════════════════════════════════════════════════════════
#  coturn — TURN/STUN server for WebRTC media relay
#  Runs as a BRIDGE-mode container on the `voipnet` docker network (see the
#  coturn service in docker/docker-compose.prod.yml). Open UDP/TCP 3478 and the
#  relay range (min-port..max-port, UDP) in your VPS firewall.
#  >>> REPLACE values marked REPLACE_ME and the public IP if it changes. <<<
# ════════════════════════════════════════════════════════════════

# Listening
listening-port=3478
# tls-listening-port=5349            # uncomment after adding certs below

# The VPS public IP (advertised relay address)
external-ip=77.237.241.24
listening-ip=0.0.0.0

# Relay port range — MUST match the published range in docker-compose.prod.yml
# (49152-49199:49152-49199/udp) and the VPS firewall. Widen all three together.
min-port=49152
max-port=49199

# ─── Authentication ─────────────────────────────────────────────
# TWO mutually-exclusive modes — pick ONE block.
#
# (A) DEFAULT: static long-term user. Simple, but the SAME password is shipped
#     to every browser forever, so a leaked credential lets anyone relay traffic
#     through your server (bandwidth theft) until you rotate it. Must match the
#     username/credential in PUBLIC_ICE_SERVERS.
lt-cred-mech
user=callnet:REPLACE_ME_turn_password
realm=voice.enjoys.in              # REPLACE_ME with your domain

# (B) RECOMMENDED: ephemeral (time-limited) credentials via shared secret.
#     The API mints a SHORT-LIVED HMAC credential per client, so a leaked
#     credential is useless after a few minutes. To enable:
#       1. Comment out the THREE lines above (lt-cred-mech / user= / realm=).
#       2. Uncomment the THREE lines below and set a strong random secret.
#       3. Set TURN_STATIC_AUTH_SECRET to the SAME secret in the API env
#          (docker/.env / prod/.env) so the HMACs match. Optionally tune
#          TURN_CRED_TTL (seconds, default 3600).
#       4. NOTE: this also disables the static user, so the Next.js dialer must
#          fetch ephemeral creds too (it currently uses the static
#          PUBLIC_ICE_SERVERS values) — wire that before flipping prod.
# realm=voice.enjoys.in
# use-auth-secret
# static-auth-secret=REPLACE_ME_turn_shared_secret

# ─── Hardening ──────────────────────────────────────────────────
no-multicast-peers
no-tlsv1
no-tlsv1_1
# Deny relaying to internal ranges, EXCEPT the voipnet docker subnet where
# FreeSWITCH lives (10.89.0.0/24) — TURN must relay the browser's media to FS
# there. allowed-peer-ip overrides denied-peer-ip, so the rest of 10/8 stays
# blocked. If you change voipnet's subnet in compose, update this to match.
denied-peer-ip=10.0.0.0-10.255.255.255
denied-peer-ip=172.16.0.0-172.31.255.255
denied-peer-ip=192.168.0.0-192.168.255.255
allowed-peer-ip=10.89.0.0-10.89.0.255

# ─── TLS (recommended for turns:// — point at Caddy/LE certs) ───
# cert=/etc/coturn/certs/fullchain.pem
# pkey=/etc/coturn/certs/privkey.pem

fingerprint
stale-nonce=600
