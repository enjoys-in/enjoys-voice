# CallNet edge — trimmed FreeSWITCH module set.
# Only modules whose build deps are installed in the Dockerfile are listed, so
# the from-source build needs NO signalwire/libks/verto/v8/spandsp toolchain.
# G.711 (PCMU/PCMA) is native to the core — no codec module required for it.

# Logging
loggers/mod_console
loggers/mod_logfile

# Core applications + dialplan
applications/mod_commands
applications/mod_dptools
applications/mod_expr
applications/mod_db
applications/mod_hash
applications/mod_esf
applications/mod_fifo
applications/mod_voicemail
applications/mod_conference
dialplans/mod_dialplan_xml

# Endpoints (SIP via sofia-sip)
endpoints/mod_sofia
endpoints/mod_loopback

# Control + CDR (the agent reads mod_cdr_csv Master.csv)
event_handlers/mod_event_socket
event_handlers/mod_cdr_csv

# Codecs (WebRTC softphones need Opus; G.711 is native)
codecs/mod_opus

# File formats / streams (voicemail playback+record, MOH, tones)
formats/mod_sndfile
formats/mod_native_file
formats/mod_local_stream
formats/mod_tone_stream

# Spoken prompts (voicemail "you have N messages", say-digits)
say/mod_say_en
