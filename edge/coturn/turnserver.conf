# CallNet Edge — coturn config template (native: apt install coturn).
# coturn.service reads /etc/turnserver.conf. install.sh renders this file,
# substituting your TURN_* values from the agent env file.
listening-port=3478
listening-ip=0.0.0.0
# external-ip MUST be THIS box's LAN IP that phones can reach.
external-ip=REPLACE_TURN_EXTERNAL_IP
# On a Linux appliance a wide relay range is fine (no Docker per-port proxy).
min-port=49160
max-port=49260
lt-cred-mech
user=REPLACE_TURN_USER:REPLACE_TURN_PASSWORD
realm=REPLACE_TURN_REALM
no-multicast-peers
fingerprint
stale-nonce=600
